server:
  port: 8888

spring:
  application:
    name: ConfigServer
  cloud:
    config:
      server:
        git:
          uri: https://github.com/Adrineel-Saha/Configurations
          clone-on-start: true
          default-label: main
          skipSslValidation: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/