services:
  config-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFERIPADDRESS=true
      # Override the C:/Microservices/logs path (used by Jenkins/local) with a
      # container path; the volume below maps it back to the same host folder.
      - LOGGING_FILE_NAME=/app/logs/ConfigServer/ConfigServer-8888.log
    volumes:
      - C:/Microservices/logs:/app/logs
    networks:
      - microservices-net

networks:
  microservices-net:
    external: true
