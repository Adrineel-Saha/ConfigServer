services:
  config-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFERIPADDRESS=true
      # Config sets logging.file.name to a C:/ path (used by Jenkins/local);
      # override to a container path written to the 'app-logs' Docker volume.
      - LOGGING_FILE_NAME=/app/logs/ConfigServer/ConfigServer-8888.log
    volumes:
      - app-logs:/app/logs
    networks:
      - microservices-net

volumes:
  app-logs:

networks:
  microservices-net:
    external: true
